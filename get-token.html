<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ECIxpress — Get Firebase Token</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
    input { width: 100%; padding: 8px; margin: 6px 0 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #token-box { margin-top: 20px; display: none; }
    textarea { width: 100%; height: 80px; font-size: 11px; box-sizing: border-box; }
    .error { color: red; margin-top: 10px; }
    .hint { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h2>Obtener Firebase ID Token</h2>
  <p class="hint">Solo para pruebas locales — no compartir el token.</p>

  <label>Web API Key (de Firebase Console → Configuración del proyecto)</label>
  <input id="api-key" type="text" placeholder="AIzaSy..." />

  <label>Email</label>
  <input id="email" type="email" placeholder="usuario@test.com" />

  <label>Password</label>
  <input id="password" type="password" />

  <button onclick="login()">Obtener token</button>
  <div id="error" class="error"></div>

  <div id="token-box">
    <p><strong>ID Token</strong> (cópialo en Swagger → Authorize):</p>
    <textarea id="token" readonly onclick="this.select()"></textarea>
    <p class="hint">Expira en 1 hora. Haz click en el textarea para seleccionar todo.</p>
  </div>

  <script>
    async function login() {
      const apiKey   = document.getElementById('api-key').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('error');
      errorEl.textContent = '';

      try {
        const res = await fetch(
          `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, returnSecureToken: true }),
          }
        );
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message ?? 'Error desconocido');

        document.getElementById('token').value = data.idToken;
        document.getElementById('token-box').style.display = 'block';
      } catch (err) {
        errorEl.textContent = err.message;
      }
    }
  </script>
</body>
</html>
